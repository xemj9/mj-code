name: verifier-release-gate

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: "Optional baseline name without the baseline: prefix."
        required: false
        default: ""
        type: string
      baseline_target:
        description: "Verifier reference to compare against the selected baseline."
        required: false
        default: "current"
        type: string
      policy:
        description: "Named verifier gate policy profile."
        required: false
        default: "release"
        type: choice
        options:
          - default
          - strict
          - release
      artifact_retention_days:
        description: "Retention for uploaded workflow artifacts."
        required: false
        default: "14"
        type: string
      github_live_mutation:
        description: "Attempt a live GitHub check-run create/update after durable verifier exports."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 3 * * *"
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  verifier-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MJ_VERIFIER_POLICY: ${{ inputs.policy || 'release' }}
      MJ_VERIFIER_BASELINE_INPUT: ${{ inputs.baseline || '' }}
      MJ_VERIFIER_BASELINE_TARGET: ${{ inputs.baseline_target || 'current' }}
      MJ_VERIFIER_RETENTION_DAYS: ${{ inputs.artifact_retention_days || '14' }}
      MJ_VERIFIER_DEFAULT_BASELINE: release-main
      MJ_VERIFIER_GITHUB_LIVE_MUTATION: ${{ inputs.github_live_mutation || vars.MJ_VERIFIER_GITHUB_LIVE_MUTATION || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Resolve verifier baseline mode
        id: baseline_mode
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .mj-code/ci
          baseline_name="${MJ_VERIFIER_BASELINE_INPUT:-}"
          if [[ -z "$baseline_name" ]]; then
            baseline_name="${MJ_VERIFIER_DEFAULT_BASELINE}"
          fi
          node dist/cli.mjs verifier baselines json --cwd "$GITHUB_WORKSPACE" --provider mock > .mj-code/ci/verifier-baselines.json
          if BASELINE_NAME="$baseline_name" node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(".mj-code/ci/verifier-baselines.json", "utf8")); process.exit(payload.items.some((entry) => entry.name === process.env.BASELINE_NAME) ? 0 : 1);'; then
            echo "baseline_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "baseline_name=$baseline_name" >> "$GITHUB_OUTPUT"

      - name: Run verifier evaluation and managed release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .mj-code/ci
          args=(
            dist/cli.mjs
            eval
            verification
            --cwd
            "$GITHUB_WORKSPACE"
            --provider
            mock
            --policy
            "$MJ_VERIFIER_POLICY"
            --write-artifact
            --write-bundle
          )
          if [[ "${{ steps.baseline_mode.outputs.baseline_exists }}" == "true" ]]; then
            args+=(
              --baseline
              "baseline:${{ steps.baseline_mode.outputs.baseline_name }}"
              --baseline-target
              "$MJ_VERIFIER_BASELINE_TARGET"
            )
          fi
          node "${args[@]}" | tee .mj-code/ci/verifier-eval.json
          node dist/cli.mjs verifier handoff latest --cwd "$GITHUB_WORKSPACE" --provider mock > .mj-code/ci/verifier-handoff.pre-upload.json
          node dist/cli.mjs verifier triage summary latest --cwd "$GITHUB_WORKSPACE" --provider mock > .mj-code/ci/verifier-triage.pre-upload.json
          if [[ "${{ steps.baseline_mode.outputs.baseline_exists }}" == "true" ]]; then
            node dist/cli.mjs verifier promotion plan "${{ steps.baseline_mode.outputs.baseline_name }}" latest --cwd "$GITHUB_WORKSPACE" --provider mock --policy "$MJ_VERIFIER_POLICY" > .mj-code/ci/verifier-promotion-plan.pre-upload.json
          fi

      - name: Upload verifier automation artifacts
        id: upload_verifier_artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-release-${{ github.run_id }}
          path: |
            .mj-code/ci
            .mj-code/verifier-inspect
          retention-days: ${{ env.MJ_VERIFIER_RETENTION_DAYS }}

      - name: Backfill upload metadata, export checks payloads, and emit annotations
        if: always()
        shell: bash
        env:
          MJ_VERIFIER_UPLOAD_NAME: verifier-release-${{ github.run_id }}
          MJ_VERIFIER_UPLOAD_ARTIFACT_ID: ${{ steps.upload_verifier_artifacts.outputs.artifact-id }}
          MJ_VERIFIER_UPLOAD_ARTIFACT_URL: ${{ steps.upload_verifier_artifacts.outputs.artifact-url }}
          MJ_VERIFIER_UPLOAD_ARTIFACT_DIGEST: ${{ steps.upload_verifier_artifacts.outputs.artifact-digest }}
          MJ_VERIFIER_UPLOAD_RETENTION_DAYS: ${{ env.MJ_VERIFIER_RETENTION_DAYS }}
        run: |
          set -euo pipefail
          node dist/cli.mjs verifier triage summary latest --cwd "$GITHUB_WORKSPACE" --provider mock --github-actions > .mj-code/ci/verifier-triage.json
          set +e
          node dist/cli.mjs verifier checks export latest --cwd "$GITHUB_WORKSPACE" --provider mock --github-actions > .mj-code/ci/verifier-checks.json
          checks_status=$?
          set -e
          node dist/cli.mjs verifier handoff latest --cwd "$GITHUB_WORKSPACE" --provider mock > .mj-code/ci/verifier-handoff.json
          node -e '
            const fs = require("node:fs");
            const payload = JSON.parse(fs.readFileSync(".mj-code/ci/verifier-checks.json", "utf8"));
            const escapeValue = (value) => `${value ?? ""}`.replace(/%/g, "%25").replace(/\r/g, "%0D").replace(/\n/g, "%0A");
            for (const annotation of payload.annotations ?? []) {
              const level = annotation.level === "failure" ? "error" : annotation.level;
              const props = [];
              if (annotation.path) props.push(`file=${annotation.path}`);
              if (annotation.startLine != null) props.push(`line=${annotation.startLine}`);
              if (annotation.endLine != null && annotation.endLine !== annotation.startLine) props.push(`endLine=${annotation.endLine}`);
              if (annotation.startColumn != null) props.push(`col=${annotation.startColumn}`);
              if (annotation.endColumn != null && annotation.endColumn !== annotation.startColumn) props.push(`endColumn=${annotation.endColumn}`);
              if (annotation.title) props.push(`title=${escapeValue(annotation.title)}`);
              const prefix = props.length > 0 ? ` ${props.join(",")}` : "";
              console.log(`::${level}${prefix}::${escapeValue(annotation.message)}`);
            }
          '
          exit "$checks_status"

      - name: Apply optional live GitHub check run mutation
        if: always() && env.MJ_VERIFIER_GITHUB_LIVE_MUTATION == 'true'
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node dist/cli.mjs verifier github apply latest summary --cwd "$GITHUB_WORKSPACE" --provider mock --github-actions > .mj-code/ci/verifier-github-mutation.json

      - name: Write verifier job summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Verifier Release Gate"
            echo
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Policy profile: \`${MJ_VERIFIER_POLICY}\`"
            if [[ "${{ steps.baseline_mode.outputs.baseline_exists }}" == "true" ]]; then
              echo "- Baseline: \`baseline:${{ steps.baseline_mode.outputs.baseline_name }}\`"
              echo "- Baseline target: \`${MJ_VERIFIER_BASELINE_TARGET}\`"
            else
            echo "- Baseline: \`(not available)\`"
              echo "- Baseline target: \`${MJ_VERIFIER_BASELINE_TARGET}\`"
            fi
            echo "- Live GitHub mutation: \`${MJ_VERIFIER_GITHUB_LIVE_MUTATION}\`"
            echo "- Uploaded artifact id: \`${{ steps.upload_verifier_artifacts.outputs.artifact-id || 'n/a' }}\`"
            echo "- Uploaded artifact url: \`${{ steps.upload_verifier_artifacts.outputs.artifact-url || 'n/a' }}\`"
            echo "- Uploaded artifact digest: \`${{ steps.upload_verifier_artifacts.outputs.artifact-digest || 'n/a' }}\`"
            echo
            node dist/cli.mjs verifier triage summary latest summary --cwd "$GITHUB_WORKSPACE" --provider mock --github-actions
            echo
            node dist/cli.mjs verifier checks summary latest summary --cwd "$GITHUB_WORKSPACE" --provider mock --github-actions
            echo
            node dist/cli.mjs verifier github result latest summary --cwd "$GITHUB_WORKSPACE" --provider mock
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verifier metadata backfill
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-release-metadata-${{ github.run_id }}
          path: |
            .mj-code/ci/verifier-handoff.json
            .mj-code/ci/verifier-triage.json
            .mj-code/ci/verifier-checks.json
            .mj-code/ci/verifier-github-mutation.json
            .mj-code/ci/verifier-promotion-plan.pre-upload.json
          if-no-files-found: ignore
          retention-days: ${{ env.MJ_VERIFIER_RETENTION_DAYS }}
